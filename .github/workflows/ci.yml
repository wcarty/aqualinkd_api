name: CI & Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Weekly scan

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Show Python
        run: python --version
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Run Ruff (auto-fix then check)
        run: |
          # Apply fixable changes first so formatting/import fixes are handled automatically
          ruff check --fix . || true
          # Re-run the check; if non-fixable issues remain this will fail the job
          ruff check .
      - name: Run Tests
        run: |
          # Prefer running pytest if tests exist, otherwise fallback to the simple script
          if [ -f pytest.ini ] || [ -d tests ]; then
            pytest -q
          else
            python custom_components/aqualinkd_api/test_merge.py
          fi

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
